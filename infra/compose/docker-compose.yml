name: app

services:
  nginx:
    container_name: nginx
    image: nginx:1.25-alpine
    user: root
    environment:
      - TZ=Asia/Seoul
    ports:
      - "443:443"
    networks:
      - app-network
      - monitoring-network
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d
      - ../nginx/log:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    healthcheck:
      test: [ "CMD-SHELL", "curl -k -f https://localhost/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

#  certbot:
#    container_name: certbot
#    image: certbot/certbot
#    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
#    environment:
#      - TZ=Asia/Seoul
#    volumes:
#      - /etc/letsencrypt:/etc/letsencrypt
#      - /var/www/certbot:/var/www/certbot
#    depends_on:
#      nginx:
#        condition: service_healthy
#    restart: unless-stopped

  frontend:
    container_name: frontend
    image: frontend:latest
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    environment:
      - TZ=Asia/Seoul
    expose:
      - "80"
    networks:
      - app-network
    restart: unless-stopped

  backend:
    container_name: backend
    image: backend:latest
    build:
      context: ../../backend
      dockerfile: Dockerfile

    env_file:
      - .env

    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - TZ=Asia/Seoul
    expose:
      - "8080"
    networks:
      - app-network
      - monitoring-network
    volumes:
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

  redis:
    container_name: redis
    image: redis:7.4-alpine
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    expose:
      - "6379"
    networks:
      - app-network
    volumes:
      - ../data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always

  postgres:
    container_name: postgres_backend
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    expose:
      - "5432"
    networks:
      - app-network
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: always

networks:
  app-network:
    external: true
  monitoring-network:
    external: true
  default:
    name: app-network
    external: true