name: sso

services:
  sso:
    container_name: sso
    image: sso:latest
    build:
      dockerfile: Dockerfile
    env_file:
      - .env.sso
    environment:
      - DB_HOST=${SSO_DB_HOST}
      - DB_PORT=${SSO_DB_PORT}
      - DB_NAME=${SSO_DB_NAME}
      - DB_USERNAME=${SSO_DB_USERNAME}
      - DB_PASSWORD=${SSO_DB_PASSWORD}
      - REDIS_HOST=${SSO_REDIS_HOST}
      - REDIS_PORT=${SSO_REDIS_PORT}
      - REDIS_PASSWORD=${SSO_REDIS_PASSWORD}
      - SSO_OAUTH_CLIENT_ID=${SSO_OAUTH_CLIENT_ID}
      - SSO_OAUTH_CLIENT_SECRET=${SSO_OAUTH_CLIENT_SECRET}
      - SSO_OAUTH_ACCESS_TOKEN_TTL=${SSO_OAUTH_ACCESS_TOKEN_TTL}
      - SSO_OAUTH_REFRESH_TOKEN_TTL=${SSO_OAUTH_REFRESH_TOKEN_TTL}
      - SSO_OAUTH_ALLOWED_ORIGINS=${SSO_OAUTH_ALLOWED_ORIGINS}
      - SSO_RSA_KEY_IDENTIFIER=${SSO_RSA_KEY_IDENTIFIER}
    ports:
      - "${SSO_SERVER_PORT:-9000}:9000"
    expose:
      - "9000"
    volumes:
      - ../logs/sso:/app/logs
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9000/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres_sso:
        condition: service_healthy
      redis_sso:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  redis_sso:
    container_name: redis_sso
    image: redis:7.4-alpine
    ports:
      - "${SSO_REDIS_PORT:-6380}:6379"
    expose:
      - "6379"
    volumes:
      - ../data/sso/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  postgres_sso:
    container_name: postgres_sso
    image: postgis/postgis:16-3.4-alpine
    env_file:
      - .env.sso
    environment:
      - POSTGRES_USER=${SSO_DB_USERNAME:?SSO_DB_USERNAME is required}
      - POSTGRES_PASSWORD=${SSO_DB_PASSWORD:?SSO_DB_PASSWORD is required}
      - POSTGRES_DB=${SSO_DB_NAME:?SSO_DB_NAME is required}
    ports:
      - "${SSO_DB_PORT:-5433}:5432"
    expose:
      - "5432"
    volumes:
      - ../data/sso/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SSO_DB_USERNAME} -d ${SSO_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
