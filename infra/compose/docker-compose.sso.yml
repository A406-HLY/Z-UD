name: sso

services:
  sso:
    container_name: sso
    image: sso:latest
    build:
      context: ../../sso
      dockerfile: Dockerfile

    env_file:
      - .env.sso

    environment:
      - DB_HOST=${SSO_DB_HOST}
      - DB_PORT=${SSO_DB_PORT}
      - DB_NAME=${SSO_DB_NAME}
      - DB_USERNAME=${SSO_DB_USERNAME}
      - DB_PASSWORD=${SSO_DB_PASSWORD}
      - REDIS_HOST=${SSO_REDIS_HOST}
      - REDIS_PORT=${SSO_REDIS_PORT}
      - REDIS_PASSWORD=${SSO_REDIS_PASSWORD}
      - SSO_OAUTH_CLIENT_ID=${SSO_OAUTH_CLIENT_ID}
      - SSO_OAUTH_CLIENT_SECRET=${SSO_OAUTH_CLIENT_SECRET}
      - SSO_OAUTH_ACCESS_TOKEN_TTL=${SSO_OAUTH_ACCESS_TOKEN_TTL}
      - SSO_OAUTH_REFRESH_TOKEN_TTL=${SSO_OAUTH_REFRESH_TOKEN_TTL}
      - SSO_OAUTH_ALLOWED_ORIGINS=${SSO_OAUTH_ALLOWED_ORIGINS}
      - SSO_RSA_KEY_IDENTIFIER=${SSO_RSA_KEY_IDENTIFIER}

    expose:
      - "9000"
    networks:
      - app-network
      - sso-network
      - monitoring-network
    volumes:
      - ../logs/sso:/app/logs
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:9000/actuator/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres_sso:
        condition: service_healthy
      redis_sso:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  redis_sso:
    container_name: redis_sso
    image: redis:7.4-alpine
    command: [ "redis-server", "--requirepass", "${SSO_REDIS_PASSWORD}" ]
    expose:
      - "6379"
    networks:
      - sso-network
    volumes:
      - ../data/sso/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${SSO_REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  postgres_sso:
    container_name: postgres_sso
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=${SSO_DB_USERNAME}
      - POSTGRES_PASSWORD=${SSO_DB_PASSWORD}
      - POSTGRES_DB=${SSO_DB_NAME}
    expose:
      - "5432"
    networks:
      - sso-network
    volumes:
      - ../data/sso/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SSO_DB_USERNAME} -d ${SSO_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

networks:
  app-network:
    external: true
  sso-network:
    driver: bridge
  monitoring-network:
    external: true
