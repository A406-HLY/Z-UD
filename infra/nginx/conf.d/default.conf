server {

    listen 80;
    server_name j14a406.p.ssafy.io;

    # HTTP 요청을 HTTPS로 자동 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}



server {

    listen 443 ssl;
    server_name j14a406.p.ssafy.io;

    # 발급받은 인증서 경로 설정
    ssl_certificate /etc/letsencrypt/live/j14a406.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14a406.p.ssafy.io/privkey.pem;

    # TLS 세션 재사용(세션 캐시) 유효기간 -> 1일
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # 허용 TLS 버전
    ssl_protocols TLSv1.2 TLSv1.3;

    location ~ ^/(swagger-ui|v3/api-docs)  {
        client_max_body_size 10M;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # Grafana 설정 수정
    location ^~ /grafana/ {
        proxy_pass http://grafana:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_redirect off;
    }

    location ^~ /prometheus/ {
        proxy_pass http://prometheus:9090;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1 {
            client_max_body_size 10M;

            proxy_pass http://backend:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 타임아웃 설정 (필요 시 조정)
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
            proxy_read_timeout 90;
    }

    location / {
        # 나중에 백엔드나 프론트엔드로 프록시 설정할 곳
        root /usr/share/nginx/html;
        index index.html;
    }
}

